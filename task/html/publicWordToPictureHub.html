<!DOCTYPE html>
<html class="JFEScope" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" user-scalable="yes" />
    <title>Cognitive Recovery Lab - Public Word to Picture</title>
    <link rel="stylesheet" href="../../shared/styles/main.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script
        src="https://code.jquery.com/jquery-3.6.3.min.js"
        integrity="sha256-pvPw+upLPUjgMXY0G+8O0xUf+/Im1MZjXxxgOcBQBXU="
        crossorigin="anonymous"></script>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: linear-gradient(145deg, #f7f8fa 0%, #e7ecf1 100%);
            font-family: futura-pt, sans-serif;
            text-rendering: optimizeLegibility;
            text-transform: none;
        }

        .hub-shell {
            width: min(760px, 92vw);
            margin: 48px auto;
            padding: 28px;
            border-radius: 16px;
            background: #ffffff;
            box-shadow: 0 16px 45px rgba(24, 47, 69, 0.14);
        }

        h1 {
            margin: 0;
            font-size: 30px;
            letter-spacing: 2px;
            color: #113451;
            font-weight: 500;
        }

        p {
            margin-top: 10px;
            color: #33495f;
            line-height: 1.4;
        }

        .grid {
            margin-top: 24px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field label {
            font-size: 14px;
            color: #2d4358;
            font-weight: 500;
        }

        .field input,
        .field select {
            border: 1px solid #c0cfda;
            border-radius: 8px;
            height: 40px;
            padding: 0 12px;
            font-size: 15px;
            color: #21374a;
            background: #fbfdff;
        }

        .field-full {
            grid-column: 1 / -1;
        }

        #hubError {
            min-height: 24px;
            margin-top: 10px;
            color: #a12e2e;
            font-size: 14px;
        }

        #startTaskButton {
            margin-top: 12px;
            width: 100%;
            height: 46px;
            border: none;
            border-radius: 10px;
            background: #1d5f89;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
        }

        #startTaskButton:hover {
            background: #194f72;
        }

        @media (max-width: 680px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .hub-shell {
                margin: 24px auto;
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="hub-shell">
        <h1>PUBLIC TASK HUB</h1>
        <p>Enter participant details, choose a task, then start. Data stays local and can be exported as PDF at completion.</p>

        <div id="publicHubForm" class="grid">
            <div class="field">
                <label for="ageInput">Age (required)</label>
                <input id="ageInput" type="number" min="1" max="120" />
            </div>
            <div class="field">
                <label for="educationInput">Education (required)</label>
                <input id="educationInput" type="text" />
            </div>
            <div class="field field-full">
                <label for="participantInput">Participant ID (optional, default XXX)</label>
                <input id="participantInput" type="text" placeholder="XXX" />
            </div>
            <div class="field field-full">
                <label for="taskVariantSelect">Task</label>
                <select id="taskVariantSelect"></select>
            </div>
        </div>

        <div id="hubError"></div>
        <button id="startTaskButton" type="button">Start Task</button>
    </div>
    <div id="Wrapper"></div>

    <script src="../../dist/taskPublic.bundle.js"></script>
    <script>
        // Populate dropdown from the registry exported by the bundle
        taskPublic.PUBLIC_TASK_REGISTRY.forEach((entry) => {
            jQuery('#taskVariantSelect').append(
                jQuery('<option>', { value: entry.key, text: entry.label })
            )
        })

        const dataUrl = (key) => `https://crlabgeorgetown.github.io/behavioral/static/data/${key}.csv`

        const validate = () => {
            if (!jQuery('#ageInput').val().trim()) return 'Age is required.'
            if (!jQuery('#educationInput').val().trim()) return 'Education is required.'
            return ''
        }

        jQuery('#startTaskButton').on('click', () => {
            const error = validate()
            if (error) { jQuery('#hubError').text(error); return }
            jQuery('#hubError').text('')

            const key = jQuery('#taskVariantSelect').val()
            const entry = taskPublic.PUBLIC_TASK_REGISTRY.find((e) => e.key === key)
            const metadata = {
                SubjectID: jQuery('#participantInput').val().trim() || 'XXX',
                Age: jQuery('#ageInput').val().trim(),
                Education: jQuery('#educationInput').val().trim(),
                Task: entry.label
            }

            jQuery('.hub-shell').hide()

            d3.csv(dataUrl(key)).then((data) => {
                new taskPublic.Task(data, entry.variantClass, metadata)
            })
        })
    </script>
</body>
</html>
